<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>イヤンホホパズル 可視化</title>
    <style>
        :root {
            --bg-color: #f7f7f7;
            --text-color: #222222;
            --border-color: #cccccc;
            --grid-color: #eaeaea;
        }
        
        body {
            font-family: 'Courier New', Courier, monospace, sans-serif, 'Noto Sans JP';
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        h1 {
            font-size: 20px;
            font-weight: normal;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
            margin-bottom: 20px;
        }

        .container {
            display: flex;
            gap: 20px;
        }

        .input-area {
            width: 300px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 10;
        }

        textarea {
            width: 100%;
            height: 450px;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid var(--border-color);
            background: #ffffff;
            font-family: monospace;
            font-size: 14px;
            resize: none;
            outline: none;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #ffffff;
            padding: 12px;
            border: 1px solid var(--border-color);
            font-size: 13px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            user-select: none;
        }

        .visual-container {
            flex: 1;
            position: relative;
            border: 1px solid var(--border-color);
            background-color: #ffffff;
            /*background-image:
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 20px 20px;*/
            min-height: 500px;
            overflow-x: hidden;
            overflow-y: hidden;
        }

        #svgOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .visual-area {
            position: relative;
            z-index: 2;
            padding: 30px;
        }

        .step-row {
            display: flex;
            align-items: center;
            height: 40px;
            position: relative;
        }

        .string-label {
            font-size: 16px;
            letter-spacing: 1px;
            white-space: nowrap;
            font-family: monospace;
        }

        .separator {
            width: 70px; /* 変換回数表示のために幅を少し広げました */
            color: #888888;
            text-align: center;
            font-size: 12px;
            font-family: monospace;
            white-space: nowrap;
        }

        .dots-container {
            display: flex;
            gap: 15px;
            padding-left: 10px;
        }

        .dot-wrapper {
            width: 12px;
            height: 12px;
            display: inline-block;
            position: relative;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            position: absolute;
            top: 0;
            left: 0;
            transition: background-color 0.2s;
        }

        .len-text {
            font-size: 11px;
            color: #888888;
            margin-left: 20px;
        }

        .sample-btn {
            background: #ffffff;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 6px 10px;
            font-family: inherit;
            font-size: 12px;
            text-align: left;
            cursor: pointer;
            transition: background 0.1s;
        }

        .sample-btn:hover {
            background: #f0f0f0;
        }
    </style>
</head>
<body>

    <h1>Iyanhoho Puzzle Path Visualizer</h1>

    <div class="container">
        <div class="input-area">
            <h3>[ Input Path ]</h3>
            <textarea id="pathInput" placeholder="abc&#10;acbb&#10;acbbb&#10;caabbb&#10;cabab">abc
acbb
acbbb
caabbb
cabab</textarea>
            
            <div class="controls">
                <label class="checkbox-label">
                    <input type="checkbox" id="toggleHighlight" checked> 変換箇所の枠（ハイライト）を表示
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="toggleColor" checked> グラフ全体に色を付ける
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="toggleDots" checked> グラフの頂点（ドット）を表示
                </label>
            </div>
            <div class="controls" style="margin-top: -7px;">
                <h4 style="margin: 0 0 8px 0; font-weight: normal; color: #555;">[ Load Sample ]</h4>
                <div style="display: flex; flex-direction: column; gap: 6px;">
                    <button class="sample-btn" data-index="0">ハロウィーン → ウーロンハイ</button>
                    <button class="sample-btn" data-index="1">12345 → 54321</button>
                    <button class="sample-btn" data-index="2">AAAAAB → BBBBBA</button>
                </div>
            </div>
        </div>

        <div class="visual-container">
            <svg id="svgOverlay"></svg>
            <div class="visual-area" id="visualArea">
                <div id="diagramFlow"></div>
            </div>
        </div>
    </div>

    <script>
        const pathInput = document.getElementById('pathInput');
        const diagramFlow = document.getElementById('diagramFlow');
        const svgOverlay = document.getElementById('svgOverlay');
        const toggleHighlight = document.getElementById('toggleHighlight');
        const toggleColor = document.getElementById('toggleColor');
        const toggleDots = document.getElementById('toggleDots');

        const colorPalette = [
            '#a62c1d', '#3b5fa6', '#f7d354', '#2d8a4e', 
            '#8e44ad', '#d35400', '#16a085', '#2c3e50'
        ];

        function findExactCharacterLinks(s1, s2) {
            let u1 = s1.split('');
            let u2 = s2.split('');
            let links = []; 

            let foundIdx = -1;
            let ruleType = ""; 
            let coreWidthFrom = 0;
            let coreWidthTo = 0;

            for (let i = 0; i <= u1.length - 2; i++) {
                let x = u1[i], y = u1[i+1];
                if (u1.slice(0, i).concat([y, x, x]).concat(u1.slice(i + 2)).join('') === s2) {
                    foundIdx = i; ruleType = "xy->yxx"; break;
                }
                if (x === y && u1.slice(0, i).concat([x, x, x]).concat(u1.slice(i + 2)).join('') === s2) {
                    foundIdx = i; ruleType = "xx->xxx"; break;
                }
            }

            if (foundIdx === -1) {
                for (let i = 0; i <= u1.length - 3; i++) {
                    let first = u1[i], second = u1[i+1], third = u1[i+2];
                    if (second === third) {
                        if (u1.slice(0, i).concat([second, first]).concat(u1.slice(i + 3)).join('') === s2) {
                            foundIdx = i; ruleType = "yxx->xy"; break;
                        }
                    }
                    if (first === second && second === third) {
                        if (u1.slice(0, i).concat([first, first]).concat(u1.slice(i + 3)).join('') === s2) {
                            foundIdx = i; ruleType = "xxx->xx"; break;
                        }
                    }
                }
            }

            if (foundIdx !== -1) {
                for (let k = 0; k < foundIdx; k++) {
                    links.push({ from: k, to: [k] });
                }

                if (ruleType === "xy->yxx") {
                    links.push({ from: foundIdx, to: [foundIdx + 1, foundIdx + 2] });
                    links.push({ from: foundIdx + 1, to: [foundIdx] });
                    coreWidthFrom = 2; coreWidthTo = 3;
                }
                else if (ruleType === "xx->xxx") {
                    links.push({ from: foundIdx, to: [foundIdx] });
                    links.push({ from: foundIdx + 1, to: [foundIdx + 1, foundIdx + 2] });
                    coreWidthFrom = 2; coreWidthTo = 3;
                } 
                else if (ruleType === "yxx->xy") {
                    links.push({ from: foundIdx, to: [foundIdx + 1] });
                    links.push({ from: foundIdx + 1, to: [foundIdx] });
                    links.push({ from: foundIdx + 2, to: [foundIdx] });
                    coreWidthFrom = 3; coreWidthTo = 2;
                }
                else if (ruleType === "xxx->xx") {
                    links.push({ from: foundIdx, to: [foundIdx + 1] });
                    links.push({ from: foundIdx + 1, to: [foundIdx] });
                    links.push({ from: foundIdx + 2, to: [foundIdx] });
                    coreWidthFrom = 3; coreWidthTo = 2;
                }

                let lenFrom = (ruleType.includes("->yxx") || ruleType.includes("->xxx")) ? 2 : 3;
                let lenTo = lenFrom === 2 ? 3 : 2;
                let rem = u1.length - (foundIdx + lenFrom);
                for (let k = 0; k < rem; k++) {
                    links.push({ from: foundIdx + lenFrom + k, to: [foundIdx + lenTo + k] });
                }
            } else {
                let k = 0;
                while (k < u1.length && k < u2.length) {
                    links.push({ from: k, to: [k] });
                    k++;
                }
            }
            return { links, foundIdx, coreWidthFrom, coreWidthTo };
        }

        async function loadSamplePath(sampleIndex) {
            try {
                const response = await fetch('sample.txt');
                if (!response.ok) throw new Error('ファイルの読み込みに失敗しました');
                const rawText = await response.text();
                const samples = rawText.split(/\n\s*\n/).map(block => block.trim()).filter(block => block.length > 0);

                if (samples[sampleIndex]) {
                    pathInput.value = samples[sampleIndex];
                    updateDiagram();
                } else {
                    alert('指定されたサンプルが見つかりません。');
                }
            } catch (error) {
                console.error(error);
                alert('sample.txt の読み込みエラー。同じディレクトリにファイルがあるか確認してください。');
            }
        }

        document.querySelectorAll('.sample-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(e.currentTarget.getAttribute('data-index'), 10);
                loadSamplePath(idx);
            });
        });

        function updateDiagram() {
            const text = pathInput.value.trim();
            if (!text) {
                diagramFlow.innerHTML = '<span style="color: #888; padding: 30px; display:block;">( No Data )</span>';
                svgOverlay.innerHTML = '';
                return;
            }

            const lines = text.split('\n').map(line => line.trim()).filter(line => line.length > 0);
            
            let maxCharLength = 0;
            lines.forEach(line => {
                if (line.length > maxCharLength) maxCharLength = line.length;
            });
            const dynamicLabelWidth = Math.max(100, maxCharLength * 17 + 20);

            const firstLine = lines[0];
            const uniqueChars = [];
            for (let char of firstLine) {
                if (!uniqueChars.includes(char)) uniqueChars.push(char);
            }

            const charColorMap = {};
            uniqueChars.forEach((char, idx) => {
                charColorMap[char] = colorPalette[idx % colorPalette.length];
            });

            diagramFlow.innerHTML = ''; 

            lines.forEach((line, index) => {
                const row = document.createElement('div');
                row.className = 'step-row';

                const label = document.createElement('div');
                label.className = 'string-label';
                label.style.width = `${dynamicLabelWidth}px`; 
                label.textContent = line;
                row.appendChild(label);

                const sep = document.createElement('div');
                sep.className = 'separator';
                // 🛠️ 改善2: 最後の行以外に、0-indexedのステップ番号を付与
                if (index < lines.length - 1) {
                    sep.textContent = `– [${index}] ->`;
                } else {
                    sep.textContent = ' '; // 最終行の辻褄合わせ用
                }
                row.appendChild(sep);

                const dotsContainer = document.createElement('div');
                dotsContainer.className = 'dots-container';

                for (let char of line) {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'dot-wrapper';

                    const dot = document.createElement('div');
                    dot.className = 'dot';
                    dot.style.backgroundColor = toggleColor.checked ? (charColorMap[char] || '#888888') : '#555555';
                    dot.style.opacity = toggleDots.checked ? '1' : '0';

                    wrapper.appendChild(dot);
                    dotsContainer.appendChild(wrapper);
                }
                row.appendChild(dotsContainer);

                const lenText = document.createElement('span');
                lenText.className = 'len-text';
                lenText.textContent = `(${line.length})`;
                row.appendChild(lenText);

                diagramFlow.appendChild(row);
            });

            setTimeout(drawTrackingLinesSVG, 50);
        }

        function drawTrackingLinesSVG() {
            svgOverlay.innerHTML = ''; 
            
            const container = svgOverlay.parentElement;
            const containerRect = container.getBoundingClientRect();

            const rows = document.querySelectorAll('.step-row');
            if (rows.length < 2) return;

            const layers = [];
            rows.forEach((row) => {
                const dots = row.querySelectorAll('.dot');
                const layerDots = [];
                dots.forEach((dot) => {
                    const rect = dot.getBoundingClientRect();
                    layerDots.push({
                        x: rect.left - containerRect.left + (rect.width / 2),
                        y: rect.top - containerRect.top + (rect.height / 2),
                        color: dot.style.backgroundColor
                    });
                });
                layers.push(layerDots);
            });

            const text = pathInput.value.trim();
            const lines = text.split('\n').map(line => line.trim()).filter(line => line.length > 0);

            for (let l = 0; l < lines.length - 1; l++) {
                const result = findExactCharacterLinks(lines[l], lines[l+1]);
                const exactLinks = result.links;
                const currDots = layers[l];
                const nextDots = layers[l+1];

                // 🛠️ 改善1: 2⇔3の段差を巻き込まないように、角の取れた6角形(polygon)で囲む
                if (toggleHighlight.checked && result.foundIdx !== -1) {
                    const startIdx = result.foundIdx;
                    const endIdxFrom = startIdx + result.coreWidthFrom - 1;
                    const endIdxTo = startIdx + result.coreWidthTo - 1;

                    // 上下のノード配列から、囲みたい端っこのドットを取得
                    const pTopLeft = currDots[startIdx];
                    const pTopRight = currDots[endIdxFrom];
                    const pBotLeft = nextDots[startIdx];
                    const pBotRight = nextDots[endIdxTo];

                    if (pTopLeft && pTopRight && pBotLeft && pBotRight) {
                        const offset = 10; // ドットを囲うマージン値
                        
                        // 6つの頂点の座標を定義して、歪んだ長方形（6角形）を形成する
                        let points = [];
                        
                        if (result.coreWidthFrom === 2 && result.coreWidthTo === 3) {
                            // 【2文字 -> 3文字の時 (右下が飛び出る)】
                            points = [
                                `${pTopLeft.x - offset},${pTopLeft.y - offset}`,                   // 左上
                                `${pTopRight.x + offset},${pTopRight.y - offset}`,                 // 右上
                                `${Math.max(pBotRight.x, pTopRight.x) + offset},${(pBotRight.y + pTopRight.y)/2}`,        // 中間（右の段差）
                                `${pBotRight.x + offset},${pBotRight.y + offset}`,                 // 右下
                                `${pBotLeft.x - offset},${pBotLeft.y + offset}`,                   // 左下
                                `${Math.min(pBotLeft.x, pTopLeft.x) - offset},${(pTopLeft.y + pBotLeft.y)/2}`                    // 中間（左）
                            ];
                        } else if (result.coreWidthFrom === 3 && result.coreWidthTo === 2) {
                            // 【3文字 -> 2文字の時 (右上が飛び出る)】
                            points = [
                                `${pTopLeft.x - offset},${pTopLeft.y - offset}`,                   // 左上
                                `${pTopRight.x + offset},${pTopRight.y - offset}`,                 // 右上
                                `${Math.max(pBotRight.x, pTopRight.x) + offset},${(pTopRight.y + pBotRight.y)/2}`,        // 中間（右の段差）
                                `${pBotRight.x + offset},${pBotRight.y + offset}`,                 // 右下
                                `${pBotLeft.x - offset},${pBotLeft.y + offset}`,                   // 左下
                                `${Math.min(pBotLeft.x, pTopLeft.x) - offset},${(pTopLeft.y + pBotLeft.y)/2}`                    // 中間（左）
                            ];
                        } else {
                            // 文字数が変わらない通常用（念のため）
                            points = [
                                `${pTopLeft.x - offset},${pTopLeft.y - offset}`,
                                `${pTopRight.x + offset},${pTopRight.y - offset}`,
                                `${pBotRight.x + offset},${pBotRight.y + offset}`,
                                `${pBotLeft.x - offset},${pBotLeft.y + offset}`
                            ];
                        }

                        const polyEl = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
                        polyEl.setAttribute('points', points.join(' '));
                        polyEl.setAttribute('fill', 'rgba(142, 68, 173, 0.0)'); // 色なしで
                        polyEl.setAttribute('stroke', 'rgba(180, 170, 230, 1)'); // 薄紫
                        polyEl.setAttribute('stroke-width', '1.5');
                        polyEl.setAttribute('stroke-linejoin', 'round'); // 角を少し丸めて柔らかく
                        svgOverlay.appendChild(polyEl);
                    }
                }

                // 線の描画
                exactLinks.forEach(link => {
                    const p1 = currDots[link.from];
                    if (!p1) return;

                    link.to.forEach(tIdx => {
                        const p2 = nextDots[tIdx];
                        if (!p2) return;

                        const lineEl = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                        lineEl.setAttribute('x1', p1.x);
                        lineEl.setAttribute('y1', p1.y);
                        lineEl.setAttribute('x2', p2.x);
                        lineEl.setAttribute('y2', p2.y);
                        
                        lineEl.setAttribute('stroke', toggleColor.checked ? p1.color : '#555555');
                        lineEl.setAttribute('stroke-width', '2');
                        
                        svgOverlay.appendChild(lineEl);
                    });
                });
            }
        }

        pathInput.addEventListener('input', updateDiagram);
        toggleHighlight.addEventListener('change', updateDiagram);
        toggleColor.addEventListener('change', updateDiagram);
        toggleDots.addEventListener('change', updateDiagram);
        window.addEventListener('resize', drawTrackingLinesSVG);
        updateDiagram();
    </script>
</body>
</html>
